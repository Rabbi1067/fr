spring.application.name=fr

# Vercel Functions route to port 80 by default, unless PORT is
# overridden in the Vercel Project Settings. Keep this default at 80
# so the app always matches Vercel's routing without extra dashboard config.
server.port=${PORT:80}
server.address=0.0.0.0

#error log file ( sob error save thakbe ai khnae)
logging.level.root=info
