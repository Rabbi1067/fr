<!-- ==================== NAV ==================== -->

<!-- Custom cursor -->

<div class="cursor-follower" id="follower"></div>

<nav id="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">
      <img th:src="@{/images/My_pic.jpeg}" alt="Fazley Rabbi">
    </div>
    Fazley<span style="color:#00d4aa">.</span>
  </div>

  <ul class="nav-links">
    <li><a href="#home"          class="active">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#competitive">Profiles</a></li>
    <li><a href="#certifications">Certs</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <div class="nav-right">
    <!-- Dark / Light theme toggle button (logic lives in js/main.js -> toggleTheme()) -->
    <button class="theme-toggle" id="themeToggle" type="button" title="Toggle dark / light mode" aria-label="Toggle dark and light mode">
      <!-- Moon icon: shown while site is in DARK mode -->
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <!-- Sun icon: shown while site is in LIGHT mode -->
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <button class="nav-hire"
      onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
      Hire Me
    </button>
  </div>
</nav>

</th:block>


<!-- ==================== FOOTER ==================== -->

<footer>
  <div class="footer-brand">Fazley<span>.</span>Rabbi</div>
  <div class="footer-copy">© 2025 Fazley Rabbi · All rights reserved</div>
  <div class="footer-links">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</footer>
</th:block>


<!-- ==================== SCRIPTS ==================== -->
<th:block th:fragment="scripts">
  <script th:src="@{/js/main.js}"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init({
      publicKey: "VnYZNtH-EJq1vfqe2"
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const form = document.getElementById("contact-form");

      form.addEventListener("submit", function (e) {

        e.preventDefault();

        const button = form.querySelector(".form-submit");

        button.disabled = true;
        button.textContent = "Sending...";

        emailjs.sendForm(
                "service_idzaejq",
                "template_8o8ucec",
                form
        )
                .then(function () {

                  // Email successfully পাঠানো হয়েছে, এখন backend এও পাঠাও logging এর জন্য
                  const formData = new FormData(form);

                  return fetch("/", {
                    method: "POST",
                    body: new URLSearchParams(formData)
                  });

                })
                .then(function () {

                  alert("✅ Message sent successfully!");
                  form.reset();

                })
                .catch(function (error) {

                  console.error("Error:", error);
                  alert("❌ Failed to send message. Please try again.");

                })
                .finally(function () {

                  button.disabled = false;
                  button.textContent = "Send Message →";

                });

      });

    });
  </script>
</th:block>

</body>
</html>
